<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BUEPT Web App</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="ambient-bg"></div>

  <div class="app-shell">
    <header class="hero">
      <img class="hero-bg" src="./assets/real_north_campus.jpg" alt="Boğaziçi Campus" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-brand">
          <img class="hero-logo" src="./assets/icon.png" alt="BUEPT" />
          <div>
            <h1>BUEPT Dashboard</h1>
            <p>Boğaziçi Prep Web • Mobile-like workspace</p>
          </div>
        </div>
        <div class="hero-actions">
          <button id="refreshSummary" class="btn">Refresh</button>
          <button id="apiStatus" class="btn ghost" type="button">Status</button>
        </div>
      </div>
    </header>

    <main class="screens">
      <section id="screen-home" class="tab-screen active">
        <div class="panel summary-panel">
          <h2>Overview</h2>
          <div id="summaryCards" class="summary-grid"></div>
          <p id="summaryNote" class="muted">Loading...</p>
        </div>

        <div class="panel home-actions">
          <h2>Quick Launch</h2>
          <div class="home-grid">
            <button class="quick-tile" data-jump-tab="Reading"><span>📖</span><strong>Reading</strong><small>Text + Questions</small></button>
            <button class="quick-tile" data-jump-tab="Grammar"><span>🧩</span><strong>Grammar</strong><small>Use of English</small></button>
            <button class="quick-tile" data-jump-tab="Writing"><span>✍️</span><strong>Writing</strong><small>Prompt + Feedback</small></button>
            <button class="quick-tile" data-jump-tab="Vocab"><span>📕</span><strong>Vocab</strong><small>Dictionary + Department</small></button>
            <button class="quick-tile" data-jump-tab="Listening"><span>🎧</span><strong>Listening</strong><small>Podcasts</small></button>
            <button class="quick-tile" data-jump-tab="Speaking"><span>🎤</span><strong>Speaking</strong><small>Coach Chatbot</small></button>
          </div>
        </div>

        <div class="panel">
          <h2>Academic Calendar</h2>
          <div id="calendar" class="result"></div>
        </div>
      </section>

      <section id="screen-reading" class="tab-screen">
        <div class="panel">
          <h2>Reading</h2>
          <div class="row">
            <select id="readingLevel">
              <option value="">All levels</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
            </select>
            <button id="nextReading" class="btn">New Reading Task</button>
          </div>
          <div id="readingResult" class="result"></div>
        </div>
      </section>

      <section id="screen-grammar" class="tab-screen">
        <div class="panel">
          <h2>Grammar</h2>
          <div class="row">
            <select id="grammarLevel">
              <option value="">All levels</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
            </select>
            <button id="nextGrammar" class="btn">New Grammar Task</button>
          </div>
          <div id="grammarResult" class="result"></div>
        </div>
      </section>

      <section id="screen-writing" class="tab-screen">
        <div class="panel">
          <h2>Writing</h2>
          <div class="row">
            <select id="writingLevel">
              <option value="">All levels</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
            </select>
            <button id="nextWriting" class="btn">New Prompt</button>
          </div>
          <div id="writingPrompt" class="result"></div>
          <textarea id="writingInput" rows="8" placeholder="Write your response here..."></textarea>
          <div class="row">
            <span id="wordCount" class="muted">0 words</span>
            <button id="quickWritingFeedback" class="btn ghost">Quick Feedback</button>
          </div>
          <div id="writingFeedback" class="result"></div>
        </div>
      </section>

      <section id="screen-vocab" class="tab-screen">
        <div class="panel">
          <h2>Vocabulary</h2>
          <div class="row">
            <input id="vocabQuery" placeholder="Search word (e.g. resilience)" />
            <button id="searchVocab" class="btn">Search</button>
            <button id="randomVocab" class="btn ghost">Random</button>
          </div>
          <div class="row">
            <select id="departmentSelect"></select>
            <button id="loadDepartmentWords" class="btn ghost">Department Words</button>
          </div>
          <div id="vocabResult" class="result"></div>
        </div>
      </section>

      <section id="screen-listening" class="tab-screen">
        <div class="panel">
          <h2>Listening Podcasts</h2>
          <div id="podcasts" class="result"></div>
        </div>
      </section>

      <section id="screen-speaking" class="tab-screen">
        <div class="panel chat-panel">
          <h2>Speaking Coach Chatbot</h2>
          <div id="chatLog" class="chat-log"></div>
          <div class="row">
            <input id="chatInput" placeholder="Ask for strategy, word meaning, or practice task..." />
            <button id="chatSend" class="btn">Send</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Main Tabs">
      <button class="tab-btn active" data-tab="Home"><span>🏠</span><small>Home</small></button>
      <button class="tab-btn" data-tab="Reading"><span>📖</span><small>Reading</small></button>
      <button class="tab-btn" data-tab="Grammar"><span>🧩</span><small>Grammar</small></button>
      <button class="tab-btn" data-tab="Writing"><span>✍️</span><small>Writing</small></button>
      <button class="tab-btn" data-tab="Vocab"><span>📕</span><small>Vocab</small></button>
      <button class="tab-btn" data-tab="Listening"><span>🎧</span><small>Listening</small></button>
      <button class="tab-btn" data-tab="Speaking"><span>🎤</span><small>Speaking</small></button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
