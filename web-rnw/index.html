<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>BUEPT App (Web)</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #0b1f3f;
      }
      #root {
        display: flex;
        flex: 1 1 auto;
        min-height: 0;
      }
      #root > div {
        flex: 1 1 auto;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
