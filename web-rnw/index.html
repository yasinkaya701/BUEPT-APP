<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231d4ed8'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-size='24' font-family='Arial' font-weight='700' fill='white'%3EBU%3C/text%3E%3C/svg%3E"
    />
    <title>BUEPT App (Web)</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto;           /* Allow native fallback scrolling */
        overscroll-behavior: none;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #0b1f3f;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      #root {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow-x: hidden;
      }

      /*
        React Native Web generates multiple nested wrapper divs (often with dir="auto" or specific classes).
        To guarantee that height propagates all the way down to the ScrollViews, we force these 
        structural wrappers to take up the full height and not expand beyond it.
      */
      #root div {
        /* Default to preventing infinite expansion for all flex children */
        min-height: 0;
      }
      
      /* Ensure the immediate layout wrappers pass down the height */
      #root > div,
      #root > div > div,
      #root > div > div > div,
      #root > div > div > div > div,
      #root > div > div > div > div > div {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
      }

      /* Global fallback: any element forced to flex: 1 should NOT expand infinitely */
      div[style*="flex: 1"] {
        min-height: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
